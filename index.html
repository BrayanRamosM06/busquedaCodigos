<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Busqueda de Códigos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  header {
    background: #1e40af;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; flex: 1; }
  header span { font-size: 11px; color: #93c5fd; }

  .search-box {
    background: #1e293b;
    padding: 14px 16px;
    border-bottom: 1px solid #334155;
    position: sticky;
    top: 48px;
    z-index: 99;
  }
  .search-box input {
    width: 100%;
    padding: 10px 14px;
    font-size: 16px;
    border: 2px solid #334155;
    border-radius: 8px;
    background: #0f172a;
    color: #e2e8f0;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: #3b82f6; }
  .search-box input::placeholder { color: #64748b; }

  .tabs {
    display: flex;
    background: #1e293b;
    padding: 0 16px 10px;
    gap: 8px;
    position: sticky;
    top: 108px;
    z-index: 98;
  }
  .tab {
    flex: 1;
    padding: 7px 0;
    text-align: center;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid #334155;
    color: #94a3b8;
    background: #0f172a;
    transition: all 0.15s;
  }
  .tab.active { background: #1e40af; color: #fff; border-color: #1e40af; }

  .stats {
    padding: 8px 16px;
    font-size: 12px;
    color: #64748b;
    background: #0f172a;
  }

  .results { padding: 8px 16px 80px; }

  .card {
    background: #1e293b;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    border-left: 4px solid #334155;
    transition: border-color 0.2s;
  }
  .card.has-stock { border-left-color: #22c55e; }
  .card.no-stock { border-left-color: #ef4444; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }
  .card-desc {
    font-size: 14px;
    font-weight: 600;
    color: #f1f5f9;
    line-height: 1.3;
    flex: 1;
  }
  .stock-badge {
    font-size: 13px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .stock-badge.positive { background: #14532d; color: #4ade80; }
  .stock-badge.zero { background: #450a0a; color: #f87171; }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: #0f172a;
    color: #94a3b8;
    font-family: monospace;
  }
  .tag span { color: #64748b; margin-right: 3px; }

  .dup-warning {
    margin-top: 8px;
    font-size: 11px;
    color: #fbbf25;
    background: #1c1700;
    border-radius: 4px;
    padding: 4px 8px;
  }

  .empty {
    text-align: center;
    color: #475569;
    padding: 60px 16px;
    font-size: 14px;
  }
  .empty span { font-size: 40px; display: block; margin-bottom: 12px; }

  .initial-msg {
    text-align: center;
    padding: 60px 16px;
    color: #475569;
  }
  .initial-msg span { font-size: 48px; display: block; margin-bottom: 12px; }
  .initial-msg p { font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<header>
  <h1>📦 Busqueda de Códigos</h1>
  <span id="total-count"></span>
</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Buscar por código, descripción o barra..." autofocus autocomplete="off" autocorrect="off" spellcheck="false">
</div>

<div class="tabs">
  <div class="tab active" onclick="setTab('all')" id="tab-all">Todos</div>
  <div class="tab" onclick="setTab('stock')" id="tab-stock">Con Existencia</div>
  <div class="tab" onclick="setTab('nostock')" id="tab-nostock">Sin Existencia</div>
</div>

<div class="stats" id="stats"></div>
<div class="results" id="results">
  <div class="initial-msg">
    <span>🔍</span>
    <p>Escribe un código, descripción<br>o código de barra para buscar</p>
  </div>
</div>

<script>
let DATA = [];

// Función para cargar los datos dinámicamente
async function cargarInventario() {
  try {
    // Busca el archivo de datos que subiremos a GitHub
    const respuesta = await fetch('datos.json');
    DATA = await respuesta.json();
    
    // Actualizar el contador de la cabecera
    const contador = document.getElementById('total-count');
    if (contador) {
      contador.textContent = DATA.length + ' resultados';
    }
  } catch (error) {
    console.error('Error al cargar el inventario:', error);
    document.getElementById('results').innerHTML = '<div class="empty"><span>⚠️</span>No se pudo cargar el inventario. Verifica que datos.json exista.</div>';
  }
}

// Ejecutar la carga al abrir la página
cargarInventario();
let currentTab = 'all';
let searchTimeout = null;

// Preprocess: build barcode -> count map for dup warnings
const barCount = {};
DATA.forEach(p => { if(p.b) barCount[p.b] = (barCount[p.b]||0) + 1; });

document.getElementById('total-count').textContent = DATA.length.toLocaleString() + ' productos';

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  doSearch();
}

document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(doSearch, 200);
});

function normalize(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function highlight(text, query) {
  if(!query) return text;
  const idx = normalize(text).indexOf(normalize(query));
  if(idx === -1) return text;
  return text.slice(0, idx) + '<mark style="background:#1d4ed8;color:#fff;border-radius:2px;padding:0 1px">' + text.slice(idx, idx + query.length) + '</mark>' + text.slice(idx + query.length);
}

function doSearch() {
  const raw = document.getElementById('searchInput').value.trim();
  const resultsEl = document.getElementById('results');
  const statsEl = document.getElementById('stats');

  if(raw.length < 2) {
    resultsEl.innerHTML = '<div class="initial-msg"><span>🔍</span><p>Escribe un código, descripción<br>o código de barra para buscar</p></div>';
    statsEl.textContent = '';
    return;
  }

  const q = normalize(raw);

  let filtered = DATA.filter(p => {
    const matchSearch = normalize(p.c).includes(q) || normalize(p.t).includes(q) || normalize(p.b).includes(q);
    if(!matchSearch) return false;
    if(currentTab === 'stock') return p.e > 0;
    if(currentTab === 'nostock') return p.e === 0;
    return true;
  });

  statsEl.textContent = filtered.length === 0 ? '' : filtered.length + ' resultado(s) encontrado(s)';

  if(filtered.length === 0) {
    resultsEl.innerHTML = '<div class="empty"><span>😕</span>Sin resultados para "' + raw + '"</div>';
    return;
  }

  // Sort: with stock first
  filtered.sort((a,b) => b.e - a.e);

  // Limit display for performance
  const toShow = filtered.slice(0, 100);
  const more = filtered.length - toShow.length;

  let html = '';
  toShow.forEach(p => {
    const hasStock = p.e > 0;
    const isDup = p.b && barCount[p.b] > 1;
    html += `<div class="card ${hasStock ? 'has-stock' : 'no-stock'}">
      <div class="card-header">
        <div class="card-desc">${highlight(p.t, raw)}</div>
        <div class="stock-badge ${hasStock ? 'positive' : 'zero'}">${hasStock ? '✓ ' + p.e : '✗ 0'}</div>
      </div>
      <div class="card-meta">
        <div class="tag"><span>SKU</span>${highlight(p.c, raw)}</div>
        ${p.b ? `<div class="tag"><span>BAR</span>${highlight(p.b, raw)}</div>` : ''}
      </div>
      ${isDup ? `<div class="dup-warning">⚠ Esta barra está amarrada a ${barCount[p.b]} códigos distintos</div>` : ''}
    </div>`;
  });

  if(more > 0) {
    html += `<div class="stats" style="text-align:center;padding:16px">... y ${more} resultado(s) más. Refina tu búsqueda.</div>`;
  }

  resultsEl.innerHTML = html;
}
</script>
</body>
</html>
